<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EcoLoop | Sustainable Marketplace</title>
    <!-- Google Fonts & Simple Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Link Css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <span>EcoLoop</span>
                </div>
                <div class="nav-links">
                    <a href="#">Marketplace</a>
                    <a href="#">Sell</a>
                    <a href="#">Impact</a>
                    <div class="theme-toggle" id="themeToggle">
                        <i class="fas fa-sun"></i>
                        <i class="fas fa-moon"></i>
                        <span style="margin-left: 4px;">Mode</span>
                    </div>
                    <div class="cart-icon" id="cartIcon">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="hero">
            <h1>Circular marketplace 🌱</h1>
            <p>Pre-loved, upcycled & zero-waste goods. Every purchase funds reforestation.</p>
        </div>

        <div class="filters">
            <div class="category-tabs" id="categoryFilters">
                <button class="cat-btn active" data-cat="all">All</button>
                <button class="cat-btn" data-cat="fashion">Fashion</button>
                <button class="cat-btn" data-cat="home">Home & Living</button>
                <button class="cat-btn" data-cat="tech">Tech</button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search items...">
            </div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026♻️ EcoLoop-Mahnoor Waheed. All Rights Reserved. </p>
        </div>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cartOverlay" class="cart-overlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fas fa-bag-shopping"></i> Your Cart</h3>
                <i class="fas fa-times" id="closeCart" style="cursor:pointer; font-size: 1.4rem;"></i>
            </div>
            <div class="cart-items" id="cartItemsList">
                <div class="empty-cart">Your cart is empty 🌿</div>
            </div>
            <div class="cart-total" id="cartTotalPrice">Total: $0.00</div>
            <button class="checkout-btn" id="checkoutBtn">Proceed to checkout →</button>
            <p style="font-size: 0.7rem; margin-top: 12px; text-align:center;">💡 Demo marketplace — no real payment</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
